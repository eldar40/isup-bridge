version: '3.8'

services:
  isup-bridge:
    build: .
    container_name: isup-bridge
    restart: unless-stopped
    ports:
      - "8080:8080"      # ISUP protocol port
      - "9090:9090"      # Prometheus metrics
    volumes:
      - ./config:/app/config:ro
      - ./storage:/app/storage
      - ./logs:/app/logs
    environment:
      - TZ=Europe/Moscow
      - PYTHONUNBUFFERED=1
    networks:
      - isup-network
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s = socket.socket(); s.connect(('localhost', 8080)); s.close()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Prometheus для мониторинга (опционально)
  prometheus:
    image: prom/prometheus:latest
    container_name: isup-prometheus
    restart: unless-stopped
    ports:
      - "9091:9090"
    volumes:
      - ./deploy/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - isup-network
    profiles:
      - monitoring

  # Grafana для визуализации (опционально)
  grafana:
    image: grafana/grafana:latest
    container_name: isup-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_INSTALL_PLUGINS=grafana-clock-panel
    volumes:
      - grafana-data:/var/lib/grafana
      - ./deploy/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./deploy/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    networks:
      - isup-network
    profiles:
      - monitoring

networks:
  isup-network:
    driver: bridge

volumes:
  prometheus-data:
  grafana-data:
