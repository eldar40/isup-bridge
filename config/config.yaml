# ВРЕМЕННЫЙ КОНФИГ ДЛЯ ТЕСТИРОВАНИЯ
server:
  host: "0.0.0.0"
  port: 8080
  log_level: "DEBUG"  # ВКЛЮЧИТЬ DEBUG!
  storage_path: "/opt/isup_bridge/storage"
  max_pending_days: 30
  health_check_port: 8081

objects:
  - object_id: "test_object"
    name: "Тестовый объект"
    description: "Для диагностики"
    address: "Тестовый адрес"
    
    c1_server:
      base_url: "https://1c-test.yourcompany.ru"
      endpoint: "/hs/access/events"
      username: "test"
      password: "test"
      timeout: 30
      max_retries: 3
      retry_delay: 5
    
    # РАЗРЕШАЕМ ВСЕ УСТРОЙСТВА ДЛЯ ТЕСТА
    devices:
      - device_id: "343831383733390D"  # Старый device_id из логов
        serial_number: "F-KD-3323PMFC-001"
        description: "Тестовый контроллер"
        type: "turnstile"
        direction: "both"
        location: "Тестовое расположение"
        floor: "1"
      
      - device_id: "GA4818739"  # Номер карты как device_id
        serial_number: "F-KD-3323PMFC-002"
        description: "Тестовый контроллер 2"
        type: "turnstile"
        direction: "both"
        location: "Тестовое расположение 2"
        floor: "1"
      
      - device_id: "3"  # Просто цифра 3
        serial_number: "F-KD-3323PMFC-003"
        description: "Тестовый контроллер 3"
        type: "turnstile"
        direction: "both"
        location: "Тестовое расположение 3"
        floor: "1"

# DEFAULT КОНФИГ ДЛЯ ЛЮБЫХ ДРУГИХ УСТРОЙСТВ
default_object:
  object_id: "default"
  name: "Неизвестные устройства"
  description: "Автоматическое определение"
  
  c1_server:
    base_url: "https://1c-default.yourcompany.ru"
    endpoint: "/hs/access/events"
    username: "default"
    password: "default"
    timeout: 30
    max_retries: 3
    retry_delay: 5

security:
  allowed_ips:
    - "37.18.105.89"
    - "0.0.0.0/0"
  
  verify_ssl: false

monitoring:
  health_check_interval: 60
  enable_alerts: false

features:
  auto_create_objects: false
  detailed_logging: true
  prometheus_enabled: false
