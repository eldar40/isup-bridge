# Card to Employee Mapping
# Маппинг номеров карт на идентификаторы сотрудников

card_mapping:
  # Формат: "НОМЕР_КАРТЫ": "ID_СОТРУДНИКА_В_1С"
  
  # Примеры разных форматов карт
  "GA4818739": "EMP001"              # ASCII карта
  "123456": "EMP002"                 # Wiegand-26
  "87654321": "EMP003"               # Wiegand-34
  "1234567890ABCDEF": "EMP004"       # HEX карта
  
  # Добавьте ваши карты ниже
  # "CARD_NUMBER": "EMPLOYEE_ID"
